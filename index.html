<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Portfolio</title>
  
  <!-- Font Inter per uno stile editoriale e pulito -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  
  <!-- Netlify Identity Widget per il pannello /admin -->
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #888888;
      --border: #eeeeee;
      --font: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font);
      background-color: var(--bg);
      color: var(--text);
      -webkit-font-smoothing: antialiased;
    }

    /* LAYOUT A DUE COLONNE (STILE RHIENON) */
    .site-container {
      display: flex;
      min-height: 100vh;
    }

    /* SIDEBAR SINISTRA (FISSA) */
    sidebar {
      width: 280px;
      padding: 50px 40px;
      position: fixed;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      border-right: 1px solid var(--border);
    }

    .brand-title {
      font-size: 0.95rem;
      font-weight: 500;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      text-decoration: none;
      color: var(--text);
      display: block;
      margin-bottom: 40px;
    }

    .nav-links {
      list-style: none;
    }

    .nav-links li {
      margin-bottom: 14px;
    }

    .nav-links a {
      text-decoration: none;
      color: var(--muted);
      font-size: 0.85rem;
      letter-spacing: 0.5px;
      transition: color 0.2s ease;
    }

    .nav-links a:hover,
    .nav-links a.active {
      color: var(--text);
    }

    .sidebar-footer {
      font-size: 0.75rem;
      color: var(--muted);
    }

    /* CONTENUTO PRINCIPALE (A DESTRA) */
    main {
      margin-left: 280px;
      flex: 1;
      padding: 50px 60px;
    }

    .page-section {
      display: none;
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .page-section.active {
      display: block;
      opacity: 1;
    }

    /* GALLERIA IMMAGINI (STYLE RHIENON) */
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(360px, 1fr));
      gap: 40px;
    }

    .art-card {
      cursor: pointer;
      text-decoration: none;
      color: inherit;
    }

    .art-image-wrapper {
      width: 100%;
      aspect-ratio: 3 / 4;
      overflow: hidden;
      background-color: #f9f9f9;
      margin-bottom: 12px;
    }

    .art-image-wrapper img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.6s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .art-card:hover img {
      transform: scale(1.03);
    }

    .art-meta {
      display: flex;
      justify-content: space-between;
      font-size: 0.82rem;
    }

    .art-title { font-weight: 400; }
    .art-category { color: var(--muted); font-weight: 300; }

    /* SEZIONE ABOUT */
    .about-content {
      max-width: 600px;
      margin-top: 20px;
    }

    .about-content h2 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 20px;
    }

    .about-content p {
      font-size: 0.95rem;
      color: #333;
      line-height: 1.8;
      font-weight: 300;
      margin-bottom: 20px;
    }

    /* SEZIONE CONTATTI */
    .contact-content {
      max-width: 480px;
      margin-top: 20px;
    }

    .contact-content h2 {
      font-size: 1.4rem;
      font-weight: 400;
      margin-bottom: 10px;
    }

    .contact-content p {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 30px;
    }

    .field-group {
      margin-bottom: 20px;
    }

    .field-group label {
      display: block;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      color: var(--muted);
      margin-bottom: 6px;
    }

    .field-group input, 
    .field-group textarea {
      width: 100%;
      padding: 12px 0;
      border: none;
      border-bottom: 1px solid var(--border);
      background: transparent;
      font-family: var(--font);
      font-size: 0.9rem;
      outline: none;
      transition: border-color 0.3s;
    }

    .field-group input:focus, 
    .field-group textarea:focus {
      border-color: var(--text);
    }

    .submit-btn {
      background-color: var(--text);
      color: #fff;
      border: none;
      padding: 14px 28px;
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 1.5px;
      cursor: pointer;
      margin-top: 10px;
    }

    /* MODALE VISUALIZZAZIONE DETTAGLIO */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100vw; height: 100vh;
      background: rgba(255, 255, 255, 0.98);
      z-index: 1000;
      overflow-y: auto;
    }

    .modal-overlay.open { display: block; }

    .modal-close {
      position: fixed;
      top: 30px; right: 40px;
      font-size: 1.6rem;
      cursor: pointer;
      z-index: 1010;
    }

    .modal-body {
      max-width: 1100px;
      margin: 60px auto;
      padding: 0 40px;
      display: grid;
      grid-template-columns: 1.2fr 1fr;
      gap: 50px;
    }

    .modal-body img {
      width: 100%;
      height: auto;
    }

    .modal-info h3 {
      font-size: 1.5rem;
      font-weight: 400;
      margin-bottom: 8px;
    }

    .modal-info .sub {
      color: var(--muted);
      font-size: 0.85rem;
      display: block;
      margin-bottom: 30px;
    }

    .modal-info p {
      font-size: 0.9rem;
      line-height: 1.7;
      color: #444;
      font-weight: 300;
    }

    /* ADATTAMENTO MOBILE */
    @media (max-width: 850px) {
      .site-container { flex-direction: column; }
      sidebar {
        width: 100%;
        height: auto;
        position: relative;
        padding: 30px 20px;
        border-right: none;
        border-bottom: 1px solid var(--border);
      }
      main { margin-left: 0; padding: 30px 20px; }
      .gallery-grid { grid-template-columns: 1fr; }
      .modal-body { grid-template-columns: 1fr; margin: 30px auto; }
    }
  </style>
</head>
<body>

  <div class="site-container">
    
    <!-- SIDEBAR SINISTRA -->
    <sidebar>
      <div>
        <a href="#" class="brand-title" onclick="switchTab('work')">IL TUO NOME</a>
        <ul class="nav-links">
          <li><a href="#" id="link-work" class="active" onclick="switchTab('work')">Work</a></li>
          <li><a href="#" id="link-about" onclick="switchTab('about')">About</a></li>
          <li><a href="#" id="link-contact" onclick="switchTab('contact')">Contact</a></li>
        </ul>
      </div>
      <div class="sidebar-footer">
        &copy; <script>document.write(new Date().getFullYear())</script> All Rights Reserved.
      </div>
    </sidebar>

    <!-- AREA CONTENUTO DESTRO -->
    <main>
      
      <!-- 1. WORK SECTION -->
      <section id="work" class="page-section active">
        <div class="gallery-grid" id="gridContainer"></div>
      </section>

      <!-- 2. ABOUT SECTION -->
      <section id="about" class="page-section">
        <div class="about-content">
          <h2>About</h2>
          <p id="bioText">Caricamento biografia...</p>
        </div>
      </section>

      <!-- 3. CONTACT SECTION -->
      <section id="contact" class="page-section">
        <div class="contact-content">
          <h2>Contact</h2>
          <p>Invia un messaggio per info o richieste.</p>

          <form action="https://formspree.io/f/moqgqgyy" method="POST">
            <div class="field-group">
              <label>Nome</label>
              <input type="text" name="name" required>
            </div>
            <div class="field-group">
              <label>Email</label>
              <input type="email" name="email" required>
            </div>
            <div class="field-group">
              <label>Messaggio</label>
              <textarea name="message" rows="4" required></textarea>
            </div>
            <button type="submit" class="submit-btn">Invia</button>
          </form>
        </div>
      </section>

    </main>
  </div>

  <!-- MODALE DETTAGLIO -->
  <div id="artModal" class="modal-overlay">
    <span class="modal-close" onclick="closeModal()">&times;</span>
    <div class="modal-body">
      <img id="mImg" src="" alt="">
      <div class="modal-info">
        <h3 id="mTitle"></h3>
        <span id="mTag" class="sub"></span>
        <p id="mDesc"></p>
      </div>
    </div>
  </div>

  <script src="disegni.js"></script>
  <script>
    function switchTab(tabId) {
      document.querySelectorAll('.page-section').forEach(el => el.classList.remove('active'));
      document.querySelectorAll('.nav-links a').forEach(el => el.classList.remove('active'));
      
      document.getElementById(tabId).classList.add('active');
      document.getElementById('link-' + tabId).classList.add('active');
      window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Rendering griglia
    const grid = document.getElementById('gridContainer');
    mieiDisegni.forEach(item => {
      const card = document.createElement('div');
      card.className = 'art-card';
      card.innerHTML = `
        <div class="art-image-wrapper">
          <img src="${item.immagine}" alt="${item.titolo}" loading="lazy">
        </div>
        <div class="art-meta">
          <span class="art-title">${item.titolo}</span>
          <span class="art-category">${item.tecnica}</span>
        </div>
      `;
      card.onclick = () => openModal(item);
      grid.appendChild(card);
    });

    if (typeof infoArtista !== 'undefined') {
      document.getElementById('bioText').innerText = infoArtista.biografia;
    }

    function openModal(item) {
      document.getElementById('mImg').src = item.immagine;
      document.getElementById('mTitle').innerText = item.titolo;
      document.getElementById('mTag').innerText = item.tecnica;
      document.getElementById('mDesc').innerText = item.concetto || item.descrizione;
      document.getElementById('artModal').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeModal() {
      document.getElementById('artModal').classList.remove('open');
      document.body.style.overflow = 'auto';
    }
  </script>
</body>
</html>
