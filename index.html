<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DarkManga - Art by Scar</title>
  
  <!-- Font Quicksand e FontAwesome -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Quicksand:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>

  <style>
    :root {
      --font-main: 'Quicksand', sans-serif;
      --color-white: #ffffff;
      --color-dark: #111111;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--font-main);
      color: var(--color-white);
      background-color: #0d1117;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* HOMEPAGE HERO */
    .hero-landing {
      position: relative;
      width: 100vw;
      height: 100vh;
      background: linear-gradient(rgba(255, 255, 255, 0.05), rgba(255, 255, 255, 0.05)), 
                  url('https://images.unsplash.com/photo-1534447677768-be436bb09401?q=80&w=2000&auto=format&fit=crop') no-repeat center center/cover;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      align-items: center;
      padding: 40px 20px 50px 20px;
      text-align: center;
    }

    .logo-container { margin-bottom: 22px; }

    .brand-badge {
      display: inline-block;
      border: 1.5px solid rgba(255, 255, 255, 0.85);
      border-radius: 9px;
      padding: 3px 18px 4px 18px;
      font-size: 0.95rem;
      letter-spacing: 2px;
      text-transform: lowercase;
      font-weight: 500;
      color: var(--color-white);
      text-decoration: none;
      backdrop-filter: blur(2px);
      transition: all 0.3s ease;
      cursor: pointer;
    }

    .brand-badge:hover { background: rgba(255, 255, 255, 0.15); }

    /* Se in futuro vuoi mettere la foto logo PNG invece del testo, gestisce l'altezza */
    .brand-badge img {
      max-height: 25px;
      vertical-align: middle;
    }

    /* MENU CON SOTTOLINEATURA ANIMATA */
    nav {
      display: flex;
      gap: 32px;
      flex-wrap: wrap;
      justify-content: center;
      align-items: center;
    }

    nav a {
      position: relative;
      color: rgba(255, 255, 255, 0.95);
      text-decoration: none;
      font-size: 1.05rem;
      font-weight: 400;
      letter-spacing: 0.5px;
      padding-bottom: 4px;
      text-shadow: 0 1px 3px rgba(0, 0, 0, 0.12);
      transition: color 0.3s ease;
      cursor: pointer;
    }

    nav a::after {
      content: '';
      position: absolute;
      width: 0%;
      height: 1.5px;
      bottom: 0;
      left: 0;
      background-color: var(--color-white);
      transition: width 0.3s ease-in-out;
      box-shadow: 0 0 4px rgba(255, 255, 255, 0.5);
    }

    nav a:hover::after, nav a.active::after { width: 100%; }

    .hero-center { margin: auto 0; }

    .hero-title {
      font-size: clamp(3.8rem, 8.5vw, 6.8rem);
      font-weight: 300;
      letter-spacing: 1.5px;
      line-height: 1.05;
      margin-bottom: 20px;
      text-shadow: 0 2px 12px rgba(0, 0, 0, 0.08);
    }

    .hero-subtitle {
      font-size: 1.35rem;
      font-weight: 300;
      letter-spacing: 1px;
      margin-bottom: 25px;
      color: rgba(255, 255, 255, 0.92);
    }

    .social-links {
      display: flex;
      gap: 20px;
      justify-content: center;
      align-items: center;
    }

    .social-links a {
      color: rgba(255, 255, 255, 0.9);
      font-size: 1.25rem;
      text-decoration: none;
      transition: transform 0.25s ease, color 0.25s ease;
    }

    .social-links a:hover {
      color: #ffffff;
      transform: translateY(-3px) scale(1.12);
    }

    /* SEZIONI SECONDARIE */
    .page-content {
      display: none;
      background-color: #ffffff;
      color: var(--color-dark);
      min-height: 100vh;
      padding: 60px 40px;
    }

    .page-content.active { display: block; }

    .page-header {
      max-width: 1200px;
      margin: 0 auto 40px auto;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .back-btn {
      background: none;
      border: 1px solid #ddd;
      padding: 8px 18px;
      font-family: var(--font-main);
      font-size: 0.85rem;
      cursor: pointer;
      border-radius: 20px;
      transition: all 0.2s;
    }

    .back-btn:hover { background: #111; color: #fff; }

    .page-title { font-weight: 300; font-size: 2.2rem; }

    .cards-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 30px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card-item {
      border-radius: 8px;
      overflow: hidden;
      border: 1px solid #eee;
      background: #fafafa;
    }

    .card-item img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }

    .card-body { padding: 20px; }
    .card-body h3 { font-weight: 400; margin-bottom: 8px; font-size: 1.2rem; }
    .card-body p { color: #666; font-size: 0.9rem; line-height: 1.5; }

    .form-wrapper { max-width: 550px; margin: 0 auto; }
    .form-group { margin-bottom: 20px; }
    .form-group label { display: block; font-size: 0.8rem; text-transform: uppercase; margin-bottom: 8px; color: #555; }
    .form-group input, .form-group textarea {
      width: 100%; padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-family: var(--font-main);
    }
  </style>
</head>
<body>

  <!-- HOMEPAGE HERO -->
  <div id="homePage" class="hero-landing">
    <header>
      <!-- LOGO BADGE: Per ora testo 'DarkManga' -->
      <div class="logo-container">
        <a id="siteLogo" class="brand-badge" onclick="switchPage('homePage')">DarkManga</a>
      </div>
      <nav>
        <a class="active" onclick="switchPage('homePage')">Home</a>
        <a onclick="switchPage('galleryPage')">Gallery</a>
        <a onclick="switchPage('aboutPage')">About</a>
        <a onclick="switchPage('eventsPage')">Events</a>
        <a onclick="switchPage('commissionsPage')">Commissions</a>
        <a onclick="switchPage('shopPage')">Shop</a>
      </nav>
    </header>

    <!-- TITOLO PRINCIPALE: Art by Scar -->
    <div class="hero-center">
      <h1 class="hero-title" id="siteTitle">Art by Scar</h1>
      <p class="hero-subtitle" id="siteSlogan">Manga Artist & Illustrator</p>
      
      <div class="social-links" id="socialBox">
        <!-- I social appariranno qui automaticamente -->
      </div>
    </div>

    <div></div>
  </div>

  <!-- GALLERIA -->
  <div id="galleryPage" class="page-content">
    <div class="page-header">
      <h2 class="page-title">Gallery</h2>
      <button class="back-btn" onclick="switchPage('homePage')">&larr; Torna alla Home</button>
    </div>
    <div class="cards-grid" id="galleryGrid"></div>
  </div>

  <!-- ABOUT -->
  <div id="aboutPage" class="page-content">
    <div class="page-header">
      <h2 class="page-title">About Scar</h2>
      <button class="back-btn" onclick="switchPage('homePage')">&larr; Torna alla Home</button>
    </div>
    <div style="max-width: 680px; margin: 0 auto;">
      <p id="bioText" style="line-height: 1.8; color: #444; font-weight: 300; font-size: 1.1rem;"></p>
    </div>
  </div>

  <!-- EVENTS -->
  <div id="eventsPage" class="page-content">
    <div class="page-header">
      <h2 class="page-title">Events</h2>
      <button class="back-btn" onclick="switchPage('homePage')">&larr; Torna alla Home</button>
    </div>
    <div class="cards-grid" id="eventsGrid"></div>
  </div>

  <!-- COMMISSIONS -->
  <div id="commissionsPage" class="page-content">
    <div class="page-header">
      <h2 class="page-title">Commissions</h2>
      <button class="back-btn" onclick="switchPage('homePage')">&larr; Torna alla Home</button>
    </div>
    <div class="form-wrapper">
      <form action="https://formspree.io/f/moqgqgyy" method="POST">
        <div class="form-group">
          <label>Nome</label>
          <input type="text" name="name" required placeholder="Il tuo nome">
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" required placeholder="La tua email">
        </div>
        <div class="form-group">
          <label>Messaggio</label>
          <textarea name="message" rows="5" required placeholder="Descrivi l'idea per la commissione..."></textarea>
        </div>
        <button type="submit" style="background:#111; color:#fff; border:none; padding:12px 24px; cursor:pointer; width:100%; border-radius:6px;">Invia</button>
      </form>
    </div>
  </div>

  <!-- SHOP -->
  <div id="shopPage" class="page-content">
    <div class="page-header">
      <h2 class="page-title">Shop</h2>
      <button class="back-btn" onclick="switchPage('homePage')">&larr; Torna alla Home</button>
    </div>
    <div class="cards-grid" id="shopGrid"></div>
  </div>

  <script src="disegni.js"></script>
  <script>
    function switchPage(pageId) {
      if (pageId === 'homePage') {
        document.getElementById('homePage').style.display = 'flex';
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
      } else {
        document.getElementById('homePage').style.display = 'none';
        document.querySelectorAll('.page-content').forEach(p => p.classList.remove('active'));
        const target = document.getElementById(pageId);
        if (target) target.classList.add('active');
      }
      window.scrollTo(0, 0);
    }

    if (typeof infoArtista !== 'undefined') {
      document.getElementById('siteLogo').innerText = infoArtista.nomeLogo || "DarkManga";
      document.getElementById('siteTitle').innerText = infoArtista.nome || "Art by Scar";
      document.getElementById('siteSlogan').innerText = infoArtista.slogan || "Manga Artist & Illustrator";
      document.getElementById('bioText').innerText = infoArtista.biografia;

      const socialBox = document.getElementById('socialBox');
      socialBox.innerHTML = '';
      if (infoArtista.instagram) socialBox.innerHTML += `<a href="${infoArtista.instagram}" target="_blank" title="Instagram"><i class="fa-brands fa-instagram"></i></a>`;
      if (infoArtista.email) socialBox.innerHTML += `<a href="mailto:${infoArtista.email}" title="Email"><i class="fa-regular fa-envelope"></i></a>`;
      if (infoArtista.mastodon) socialBox.innerHTML += `<a href="${infoArtista.mastodon}" target="_blank" title="Mastodon"><i class="fa-brands fa-mastodon"></i></a>`;
      if (infoArtista.linktree) socialBox.innerHTML += `<a href="${infoArtista.linktree}" target="_blank" title="Linktree"><i class="fa-regular fa-bookmark"></i></a>`;
    }

    const galleryGrid = document.getElementById('galleryGrid');
    if (typeof mieiDisegni !== 'undefined' && galleryGrid) {
      mieiDisegni.forEach(item => {
        const div = document.createElement('div');
        div.className = 'card-item';
        div.innerHTML = `
          <img src="${item.immagine}" alt="${item.titolo}">
          <div class="card-body">
            <h3>${item.titolo}</h3>
            <p>${item.tecnica || ''}</p>
          </div>
        `;
        galleryGrid.appendChild(div);
      });
    }
  </script>
</body>
</html>
