<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Il Mio Portfolio Artistico</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background-color: #f8f9fa;
      color: #333;
      margin: 0;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 40px 0;
    }

    /* Griglia reattiva per i disegni */
    .gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .card {
      background: white;
      border-radius: 12px;
      overflow: hidden;
      box-shadow: 0 4px 15px rgba(0,0,0,0.08);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
    }

    .card:hover {
      transform: translateY(-5px);
      box-shadow: 0 8px 25px rgba(0,0,0,0.15);
    }

    .card img {
      width: 100%;
      height: 250px;
      object-fit: cover;
      display: block;
    }

    .card-info {
      padding: 15px;
    }

    .card-info h3 {
      margin: 0 0 5px 0;
      font-size: 1.2rem;
    }

    .card-info .tag {
      display: inline-block;
      background: #e9ecef;
      color: #495057;
      font-size: 0.8rem;
      padding: 3px 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }

    .card-info p {
      margin: 0;
      font-size: 0.9rem;
      color: #6c757d;
    }
  </style>
</head>
<body>

  <header>
    <h1>Portfolio Artistico</h1>
    <p>Una selezione delle mie opere e illustrazioni</p>
  </header>

  <main class="gallery" id="galleria"></main>

  <script src="disegni.js"></script>
  <script>
    const galleria = document.getElementById('galleria');

    // Genera automaticamente le schede dai dati
    mieiDisegni.forEach(disegno => {
      const card = document.createElement('div');
      card.className = 'card';
      card.innerHTML = `
        <img src="${disegno.immagine}" alt="${disegno.titolo}" loading="lazy">
        <div class="card-info">
          <h3>${disegno.titolo}</h3>
          <span class="tag">${disegno.tecnica}</span>
          <p>${disegno.descrizione}</p>
        </div>
      `;
      galleria.appendChild(card);
    });
  </script>
</body>
</html>
